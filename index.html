    <script type="module">
      window.__pdfViewerStarted = true;
      import * as pdfjsLib from "./pdfjs/pdf.min.mjs";

      pdfjsLib.GlobalWorkerOptions.workerSrc = "./pdfjs/pdf.worker.min.mjs";

      const PDF_URL = "./catalog.pdf";
      const loadingEl = document.getElementById("loading");
      const errorEl = document.getElementById("error");
      const viewerEl = document.getElementById("viewer");
      const pageStates = new Map();
      let pdfDoc = null;
      let lazyObserver = null;
      const pageIndicator = document.getElementById("page-indicator");
      let scrollTimer = null;
      let totalPages = 0;

      function showError(err) {
        loadingEl.style.display = "none";
        errorEl.style.display = "block";
        errorEl.textContent = "Unable to load the catalog. Please try refreshing the page.";
        console.error(err);
      }

      function getPageWidth() {
        return Math.max(Math.min(viewerEl.clientWidth || window.innerWidth, 1000), 320);
      }

      async function renderPage(pageNumber) {
        const state = pageStates.get(pageNumber);
        if (!state || state.rendered || state.rendering) return;

        state.rendering = true;
        try {
          const page = await pdfDoc.getPage(pageNumber);
          const baseViewport = page.getViewport({ scale: 1 });
          const scale = getPageWidth() / baseViewport.width;
          const viewport = page.getViewport({ scale });
          // Cap at 2x to prevent canvas memory exhaustion on high-DPI mobile
          const outputScale = Math.min(window.devicePixelRatio || 1, 2);
          const canvas = state.canvas;
          const ctx = canvas.getContext("2d", { alpha: false });

          canvas.width = Math.floor(viewport.width * outputScale);
          canvas.height = Math.floor(viewport.height * outputScale);
          canvas.style.width = Math.floor(viewport.width) + "px";
          canvas.style.height = Math.floor(viewport.height) + "px";
          state.shell.style.minHeight = Math.floor(viewport.height) + "px";

          await page.render({
            canvasContext: ctx,
            viewport: viewport,
            transform: outputScale === 1 ? null : [outputScale, 0, 0, outputScale, 0, 0],
          }).promise;

          state.rendered = true;
        } catch (err) {
          console.error("Failed to render page " + pageNumber, err);
        } finally {
          state.rendering = false;
        }
      }

      function addPagePlaceholders(totalPages, aspectRatio) {
        viewerEl.innerHTML = "";
        const estimatedHeight = Math.max(420, Math.floor(getPageWidth() * aspectRatio));
        for (let i = 1; i <= totalPages; i++) {
          const shell = document.createElement("section");
          shell.className = "page-shell";
          shell.dataset.page = String(i);
          shell.style.minHeight = estimatedHeight + "px";

          const canvas = document.createElement("canvas");
          canvas.className = "page-canvas";
          shell.appendChild(canvas);

          viewerEl.appendChild(shell);
          pageStates.set(i, {
            canvas,
            shell,
            rendered: false,
            rendering: false,
          });
        }
      }

      async function renderInitialPages() {
        const count = Math.min(pdfDoc.numPages, 3);
        for (let i = 1; i <= count; i++) {
          await renderPage(i);
          document.getElementById("loader-text").textContent =
            "Loading page " + i + " of " + pdfDoc.numPages + "…";
          document.getElementById("loader-bar").style.width =
            Math.round((i / Math.min(pdfDoc.numPages, 3)) * 100) + "%";
        }
      }

      function setupLazyRender() {
        lazyObserver = new IntersectionObserver(
          (entries) => {
            for (const entry of entries) {
              if (!entry.isIntersecting) continue;
              const pageNumber = Number(entry.target.dataset.page);
              const state = pageStates.get(pageNumber);
              if (!state || state.rendered || state.rendering) continue;
              renderPage(pageNumber).then(() => {
                if (state.rendered) {
                  lazyObserver.unobserve(entry.target);
                }
              });
            }
          },
          { root: null, rootMargin: "600px 0px", threshold: 0.01 },
        );

        for (const state of pageStates.values()) {
          if (!state.rendered) {
            lazyObserver.observe(state.shell);
          }
        }
      }

      function updatePageIndicator() {
        if (!totalPages) return;
        let current = 1;
        const scrollY = window.scrollY + window.innerHeight / 3;
        for (const [num, state] of pageStates.entries()) {
          if (state.shell.offsetTop <= scrollY) current = num;
        }
        pageIndicator.textContent = current + " / " + totalPages;
        pageIndicator.classList.add("visible");
        clearTimeout(scrollTimer);
        scrollTimer = setTimeout(() => {
          pageIndicator.classList.remove("visible");
        }, 1500);
      }

      window.addEventListener("scroll", updatePageIndicator, { passive: true });

      function handleResize() {
        if (!pdfDoc || !lazyObserver) return;
        // Mark all rendered pages for re-render; re-observe so the
        // IntersectionObserver fires again for visible ones.
        for (const state of pageStates.values()) {
          if (state.rendered && !state.rendering) {
            state.rendered = false;
            lazyObserver.observe(state.shell);
          }
        }
      }

      let resizeTimer = null;
      window.addEventListener("resize", () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(handleResize, 250);
      });

      async function init() {
        pdfDoc = await pdfjsLib.getDocument({
          url: PDF_URL,
          rangeChunkSize: 65536,
          disableAutoFetch: true,
          disableStream: false,
        }).promise;
        totalPages = pdfDoc.numPages;
        const firstPage = await pdfDoc.getPage(1);
        const vp = firstPage.getViewport({ scale: 1 });
        addPagePlaceholders(totalPages, vp.height / vp.width);
        await renderInitialPages();
        setupLazyRender();
        loadingEl.classList.add("fade-out");
        setTimeout(() => {
          loadingEl.style.display = "none";
        }, 400);
        updatePageIndicator();
      }

      init().catch(showError);
    </script>
